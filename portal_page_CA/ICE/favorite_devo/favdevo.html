<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <!-- Add your devotional content here -->
         <table class="content-table">
            <tr>
              <th>Speaker</th>
              <td>President Russell M. Nelson</td>
              <td>President Jeffery R. Holland</td>
              <td>Brad R. Wilcox</td>
            </tr>
            <tr>
              <th>Title</th>
              <td>Choices For Eternity</td>
              <td>Israel, Israel, God Is Calling</td>
              <td>His Grace Is Sufficient</td>
            </tr>
            <tr>
              <th>Location</th>
              <td>Salt Lake City, UT</td>
              <td>St. George, UT</td>
              <td>Provo, UT</td>
            </tr>
              <tr>
                <th>Year</th>
                <td>2022</td>
                <td>2012</td>
                <td>2011</td>
              </tr>
         </table>
         <form>
          <input type="text" placeholder="Add Speaker">
          <input type="text" placeholder="Add Title">
          <input type="text" placeholder="Add Location">
          <input type="text" placeholder="Add Year">
        </form>
      </div>
    </main>
    
  </div>
</body>
</html>
