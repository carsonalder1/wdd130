<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        #christus {
            background: url(images/christus.webp); 
            border-radius: 50px;
            border-width: 10px;
            border-color: black;
            border-style: solid;
            text-align: center;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            width: 1000px;
            height: 1000px;
            margin: auto;
        }
        #circle {
            border-radius: 100%;
            border-style: solid;
            border-width: 10px;
            border-color: white;
        }
    </style>
</head>
<body>
   <div id="christus"> 
        <h1>First Presidency</h1>
        <img src="images/eyring.webp" alt="Henry B. Eyring" width="150" id="circle">
        <img src="images/oaks.webp" alt="Dallin H. Oaks" width="200" id="circle">
        <img src="images/christofferson.webp" alt="D. Todd Christofferson" width="150" id="circle">
        <h2>Quorum of the Twelve Apostles</h2>
        <img src="images/holland.webp" alt="Jeffrey R. Holland" width="100" id="circle">
        <img src="images/uchtdorf.webp" alt="Deiter F. Uchtdorf" width="100" id="circle">
        <img src="images/bednar.webp" alt="David A. Bednar" width="100" id="circle">
        <img src="images/cook.webp" alt="Quentin L. Cook" width="100" id="circle">
        <br>
        <img src="images/anderson.webp" alt="Neil L. Anderson" width="100" id="circle">
        <img src="images/rasband.webp" alt="Ronald A. Rasband" width="100" id="circle">
        <img src="images/stevenson.webp" alt="Gary E. Stevenson" width="100" id="circle">
        <img src="images/renlund.webp" alt="Dale G. Renlund" width="100" id="circle">
        <br>
        <img src="images/gong.webp" alt="Gerrit W. Gong" width="100" id="circle">
        <img src="images/soares.webp" alt="Ulisses Soares" width="100" id="circle">
        <img src="images/kearon.webp" alt="Patrick Kearon" width="100" id="circle">
        <img src="images/causse.webp" alt="Gerald Caussé" width="100" id="circle">
   </div> 
</body>
</html>
