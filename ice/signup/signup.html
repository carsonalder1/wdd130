<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
            box-sizing: border-box;
        }

        body {
            background: rgb(120, 96, 64);
        }
        
        #formContainer {
            background: white;
            border-style: solid;
            border-width: 10px;
            border-color: navy;
            width: 400px;
            margin: 50px auto;
            border-radius: 50px;
            position: relative;
            overflow: hidden;
            text-align: center;
            color: white;
        }

        #headersection {
            background-image: url(/images/jesus_feeds_5000.jpeg);
            background-size: cover;
            background-position: center top;
            height: 200px;
            flex-direction: column;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        #closeBtn {
            position: absolute;
            top: 8px;
            left: 12px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            z-index: 10;
        }

        #closeBtn:hover {
            background: #eee;
        }

        #formContainer h1 {
            font-size: 2rem;
            text-shadow: 2px 2px 4px black;
        }

        #formContainer h2 {
            font-size: 1.2rem;
            text-shadow: 2px 2px 4px black;
        }
        
        #scriptures {
            display: flex;
            gap: 4px;
            width: 100%;
            justify-content: center;
            background: #1a1a2e;
            padding: 10px 8px;
        }

        #scriptures img {
            width: 60px;
            height: 80px;
            object-fit: cover;
            border: 1px solid #555;
        }

        #myForm {
            grid-template-columns: auto 1fr;
            display: grid;
            gap: 10px;
            padding: 20px 40px;
            color: black;
        }

        #myForm h3 {
            grid-column: 1 / 3;
            margin-bottom: 5px;
        }

        #myForm label {
            grid-column: 1 / 2;
            text-align: right;
            align-self: center;
            white-space: nowrap;
            padding-right: 5px;
        }

        #myForm input[type="text"],
        #myForm input[type="password"],
        #myForm input[type="email"] {
            grid-column: 2 / 3;
            padding: 4px 6px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }

        .gender-row-label {
            grid-column: 1 / 2;
            text-align: right;
            align-self: center;
            padding-right: 5px;
        }

        .gender-row-inputs {
            grid-column: 2 / 3;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .full-row {
            grid-column: 1 / 3;
            text-align: center;
        }
    </style>


</head>

<body>
    
    <div id="formContainer">
        <div id="headersection">
            <button type="button" id="closeBtn">X</button>
            <h1>Daily Feed</h1>
            <h2>A Scripture a Day</h2>
        </div>
        <form id="myForm">
            <h3 style="color: black;">Sign Up for Daily Scripture Feed</h3>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <span class="gender-row-label">Gender:</span>
            <div class="gender-row-inputs">
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male" style="grid-column: unset; text-align: left; padding: 0;">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female" style="grid-column: unset; text-align: left; padding: 0;">Female</label>
            </div>

            <div class="full-row">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter" style="grid-column: unset; text-align: left; padding: 0;">Subscribe to newsletter</label>
            </div>

            <div class="full-row">
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions" style="grid-column: unset; text-align: left; padding: 0;">I acknowledge the terms and conditions</label>
            </div>

            <div class="full-row">
                <button type="submit">Submit</button>
            </div>
        </form>
        <div id="scriptures">
        <img src="/images/old_testament.webp">
        <img src="/images/new_testament.webp">
        <img src ="images/book_of_mormon.webp">
        <img src ="images/doctrine_and_covenants.webp">
        <img src = "/images/pearl_of_great_price.webp">
        </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
